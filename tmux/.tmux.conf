# set -g pane-active-border-style "fg=#6b7089"
# set -g pane-border-style "fg=#6b7089"

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default fg=#A0A0A0"
set -g status-interval 1

# keep pane/window backgrounds transparent (inherit terminal background)
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# left: session
set -g status-left "#[fg=#FFC799,bold] #S #[fg=#5C5C5C]│ "
set -g status-left-length 20

# right: time only
set -g status-right "#[fg=#A0A0A0]%-I:%M %p "
set -g status-right-length 50

# window format
setw -g window-status-format "#[fg=#5C5C5C] #I #W "
setw -g window-status-current-format "#[fg=#FFFFFF,bold] #I #W "
setw -g window-status-separator ""

# pane borders
set -g pane-border-lines simple
set -g pane-border-style "fg=#555555"
set -g pane-active-border-style "fg=#FFC799"

# message style
set -g message-style "bg=default fg=#FFFFFF"
set -g message-command-style "bg=default fg=#FFFFFF"

# mode style (copy mode)
setw -g mode-style "bg=default fg=#FFFFFF"

# clock
setw -g clock-mode-colour "#FFC799"


# source ~/.dotfiles/tmux/falcon.tmux.conf
# source ~/.dotfiles/tmux/catppuccin_mocha.tmux.conf
# source ~/.dotfiles/tmux/catppuccin.tmux.conf

vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# set -g status-style fg=white,bg=black
